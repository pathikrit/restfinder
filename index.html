<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="last-updated" content="">
    <title>Restaurant Finder</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍴</text></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <link rel="stylesheet" href="https://kit.fontawesome.com/a22be8527e.css" crossorigin="anonymous">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f172a; color: #e2e8f0; }

        #city-tabs {
            display: flex;
            background: #0f172a;
            padding: 0 12px;
            border-bottom: 1px solid #1e293b;
        }
        #city-tabs button {
            padding: 10px 20px;
            background: none;
            border: none;
            color: #64748b;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: color 0.15s, border-color 0.15s;
        }
        #city-tabs button:hover { color: #cbd5e1; }
        #city-tabs button.active { color: #f1f5f9; border-bottom-color: #3b82f6; }
        #city-tabs button:disabled { color: #334155; cursor: not-allowed; }
        #city-tabs button:disabled:hover { color: #334155; }

        #github-link {
            display: flex;
            align-items: center;
            padding: 0 14px;
            color: #64748b;
            font-size: 20px;
            text-decoration: none;
            transition: color 0.15s;
        }
        #github-link:hover { color: #f1f5f9; }

        #last-updated {
            margin-left: auto;
            display: flex;
            align-items: center;
            color: #475569;
            font-size: 11px;
        }

        #map-wrap { position: relative; height: 50%; }
        #map { width: 100%; height: 100%; }

        #table-wrap {
            height: calc(50% - 40px);
            overflow-y: auto;
            background: #0f172a;
        }
        #table-wrap table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        #table-wrap thead {
            position: sticky;
            top: 0;
            background: #1e293b;
        }
        #table-wrap th {
            text-align: left;
            padding: 8px 10px;
            font-weight: 600;
            color: #94a3b8;
            border-bottom: 2px solid #334155;
        }
        #table-wrap td {
            padding: 7px 10px;
            border-bottom: 1px solid #1e293b;
            color: #cbd5e1;
            max-width: 220px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        #table-wrap tr.data-row { cursor: pointer; }
        #table-wrap tr.data-row:hover { background: #1e293b; }
        #table-wrap tr.data-row.selected { background: #1e3a5f; }
        #table-wrap td a { color: #60a5fa; text-decoration: none; }
        #table-wrap td a:hover { text-decoration: underline; }
        #table-wrap td a.foodie-link { color: #f59e0b; }
        .col-filter {
            display: flex;
            align-items: center;
            margin-top: 4px;
            position: relative;
        }
        .col-filter input {
            width: 100%;
            padding: 3px 20px 3px 6px;
            border: 1px solid #334155;
            border-radius: 4px;
            background: #0f172a;
            color: #e2e8f0;
            font-size: 11px;
            outline: none;
        }
        .col-filter input::placeholder { color: #475569; }
        .col-filter input:focus { border-color: #3b82f6; }
        .col-filter .clear-btn {
            position: absolute;
            right: 3px;
            background: none;
            border: none;
            color: #475569;
            font-size: 13px;
            cursor: pointer;
            display: none;
            line-height: 1;
            padding: 0 2px;
        }
        .col-filter .clear-btn:hover { color: #e2e8f0; }
        .col-filter input:not(:placeholder-shown) + .clear-btn { display: block; }
        .red-marker { filter: hue-rotate(150deg) saturate(2); }
        .pin-label {
            font-size: 12px;
            font-weight: 600;
            background: rgba(15, 23, 42, 0.85);
            color: #f1f5f9;
            border: 1px solid #334155;
            border-radius: 4px;
            padding: 2px 6px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.3);
        }
        #placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #475569;
            font-size: 15px;
        }
    </style>
</head>
<body>
    <nav id="city-tabs"><span id="last-updated"></span></nav>
    <div id="map-wrap">
        <div id="map"></div>
    </div>
    <div id="table-wrap">
        <div id="placeholder">Loading...</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <script>
        const map = L.map('map');
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
        }).addTo(map);

        L.Control.ResetView = L.Control.extend({
            onAdd() {
                const btn = L.DomUtil.create('div', 'leaflet-bar');
                btn.innerHTML = '<a href="#" title="Reset view" style="font-size:16px;display:flex;align-items:center;justify-content:center;width:30px;height:30px"><i class="fa-solid fa-house"></i></a>';
                btn.querySelector('a').addEventListener('click', e => {
                    e.preventDefault();
                    const city = cities.find(c => c.key === activeCity);
                    if (city) map.setView([city.lat, city.lng], city.zoom);
                });
                L.DomEvent.disableClickPropagation(btn);
                return btn;
            }
        });
        new L.Control.ResetView({ position: 'topleft' }).addTo(map);

        const markerLayer = L.layerGroup().addTo(map);
        const tableWrap = document.getElementById('table-wrap');
        const tabsNav = document.getElementById('city-tabs');

        const defaultIcon = L.icon({
            iconUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/marker-icon.png',
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/marker-shadow.png',
            iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
        });
        const redIcon = L.icon({
            iconUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/marker-icon.png',
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/marker-shadow.png',
            iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41],
            className: 'red-marker'
        });
        const whimsyIcon = L.divIcon({
            html: '<span style="font-size:28px">&#x1F47B;</span>',
            className: '', iconSize: [28, 28], iconAnchor: [14, 28], popupAnchor: [0, -28]
        });

        function distinctDomains(urls) {
            if (!urls || !urls.length) return new Set();
            const domains = new Set();
            urls.forEach(u => { try { const h = new URL(u).hostname.split('.'); domains.add(h.slice(-2).join('.')); } catch {} });
            return domains;
        }

        function pickIcon(r) {
            const domains = distinctDomains(r.foodie_urls);
            if (domains.has('www.atlasobscura.com')) return whimsyIcon;
            if (domains.size >= 2) return redIcon;
            return defaultIcon;
        }

        let cities = [];
        let activeCity = null;
        let cityData = {};
        let markers = {};
        let colFilters = { name: '', cuisine: '', address: '' };

        // --- Last updated ---
        const updatedMeta = document.querySelector('meta[name="last-updated"]');
        if (updatedMeta && updatedMeta.content) {
            document.getElementById('last-updated').textContent = 'Updated: ' + updatedMeta.content;
        }

        function esc(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        // --- Load cities.json and bootstrap ---
        fetch('cities.json').then(r => r.json()).then(allCities => {
            cities = allCities.filter(c => c.enabled !== false);
            const lastUpdated = document.getElementById('last-updated');
            allCities.forEach(city => {
                const btn = document.createElement('button');
                btn.textContent = city.name;
                btn.dataset.key = city.key;
                if (city.enabled !== false) {
                    btn.addEventListener('click', () => selectCity(city.key));
                } else {
                    btn.disabled = true;
                    btn.title = 'Coming soon';
                }
                tabsNav.insertBefore(btn, lastUpdated);
            });
            const ghLink = document.createElement('a');
            ghLink.href = 'https://github.com/pathikrit/restfinder';
            ghLink.target = '_blank';
            ghLink.rel = 'noopener';
            ghLink.id = 'github-link';
            ghLink.innerHTML = '<i class="fa-brands fa-github"></i>';
            tabsNav.appendChild(ghLink);
            selectCity(cities[0].key);
        });

        async function selectCity(key) {
            activeCity = key;
            tabsNav.querySelectorAll('button').forEach(b =>
                b.classList.toggle('active', b.dataset.key === key));
            const city = cities.find(c => c.key === key);
            map.setView([city.lat, city.lng], city.zoom);

            tableWrap.innerHTML = '<div id="placeholder">Loading...</div>';
            try {
                await loadCityData(key);
                updateView();
            } catch (err) {
                console.error(err);
                tableWrap.innerHTML = '<div id="placeholder">Failed to load restaurant data.</div>';
            }
        }

        async function loadCityData(key) {
            if (cityData[key]) return;
            const resp = await fetch(`data/${key}.json`);
            if (!resp.ok) throw new Error(`Failed to load data/${key}.json`);
            cityData[key] = await resp.json();
        }

        function formatFoodieLinks(urls) {
            if (!urls || !urls.length) return '';
            return urls.map(url => {
                const parts = new URL(url).hostname.replace(/^www\./, '').split('.');
                const domain = (parts.length > 2 ? parts.slice(1, -1) : parts.slice(0, -1)).join('.')
                    .replace(/\b\w/g, c => c.toUpperCase());
                return `<a href="${esc(url)}" target="_blank" rel="noopener" class="foodie-link">${esc(domain)}</a>`;
            }).join(', ');
        }

        // --- Filter to visible bounds and render ---
        function updateView() {
            if (!activeCity || !cityData[activeCity]) return;
            const bounds = map.getBounds();
            let visible = cityData[activeCity].filter(r =>
                r.lat >= bounds.getSouth() && r.lat <= bounds.getNorth() &&
                r.lon >= bounds.getWest() && r.lon <= bounds.getEast()
            );

            if (colFilters.name) {
                const q = colFilters.name.toLowerCase();
                visible = visible.filter(r => (r.name || '').toLowerCase().includes(q));
            }
            if (colFilters.cuisine) {
                const q = colFilters.cuisine.toLowerCase();
                visible = visible.filter(r => (r.cuisine || '').toLowerCase().includes(q));
            }
            if (colFilters.address) {
                const q = colFilters.address.toLowerCase();
                visible = visible.filter(r => (r.address || '').toLowerCase().includes(q));
            }

            markerLayer.clearLayers();
            markers = {};
            visible.forEach(r => {
                const name = r.name || 'Unnamed';
                const cuisine = r.cuisine || '';
                const address = r.address || '';
                const phone = r.phone || '';

                let popup = `<strong>${esc(name)}</strong>`;
                if (cuisine) popup += `<br>${esc(cuisine)}`;
                if (address) popup += `<br><i class="fa-solid fa-location-dot"></i> <address style="font-style:normal;display:inline">${esc(address)}</address>`;
                if (phone) popup += `<br><i class="fa-solid fa-phone"></i> <a href="tel:${esc(phone)}">${esc(phone)}</a>`;
                if (r.foodie_urls && r.foodie_urls.length) {
                    popup += `<br><strong style="color:#f59e0b">Mentions:</strong> ${formatFoodieLinks(r.foodie_urls)}`;
                }
                const m = L.marker([r.lat, r.lon], { icon: pickIcon(r) }).bindPopup(popup);
                if (visible.length <= 10) m.bindTooltip(name, { permanent: true, direction: 'top', className: 'pin-label' });
                m.addTo(markerLayer);
                markers[r.id] = m;
            });

            const filterInput = (key) => `<div class="col-filter"><input type="text" data-filter="${key}" placeholder="Filter..." value="${esc(colFilters[key])}"><button class="clear-btn" data-clear="${key}">&times;</button></div>`;
            let html = `<table><thead><tr>
                <th>#</th><th>Name${filterInput('name')}</th><th>Cuisine${filterInput('cuisine')}</th><th>Address${filterInput('address')}</th>
                <th>Phone</th><th>Mentions</th>
                </tr></thead><tbody>`;
            visible.forEach((r, i) => {
                const name = r.name || 'Unnamed';
                const cuisine = r.cuisine || '';
                const address = r.address || '';
                const phone = r.phone || '';
                const foodie = formatFoodieLinks(r.foodie_urls);
                html += `<tr class="data-row" data-id="${r.id}" data-lat="${r.lat}" data-lon="${r.lon}">
                    <td>${i + 1}</td>
                    <td title="${esc(name)}">${esc(name)}</td>
                    <td title="${esc(cuisine)}">${esc(cuisine)}</td>
                    <td title="${esc(address)}"><address style="font-style:normal">${esc(address)}</address></td>
                    <td>${phone ? `<a href="tel:${esc(phone)}">${esc(phone)}</a>` : ''}</td>
                    <td>${foodie}</td></tr>`;
            });
            if (visible.length === 0) {
                html += `<tr><td colspan="6" style="text-align:center;color:#475569;padding:20px">No matching restaurants.</td></tr>`;
            }
            html += '</tbody></table>';
            const activeFilter = document.activeElement && document.activeElement.dataset && document.activeElement.dataset.filter;
            tableWrap.innerHTML = html;

            tableWrap.querySelectorAll('.col-filter input').forEach(input => {
                input.addEventListener('input', e => {
                    colFilters[e.target.dataset.filter] = e.target.value;
                    updateView();
                });
                input.addEventListener('click', e => e.stopPropagation());
                if (input.dataset.filter === activeFilter) {
                    input.focus();
                    input.setSelectionRange(input.value.length, input.value.length);
                }
            });
            tableWrap.querySelectorAll('.col-filter .clear-btn').forEach(btn => {
                btn.addEventListener('click', e => {
                    e.stopPropagation();
                    colFilters[btn.dataset.clear] = '';
                    updateView();
                });
            });

            tableWrap.querySelectorAll('tr.data-row').forEach(row => {
                row.addEventListener('click', () => {
                    tableWrap.querySelectorAll('tr.data-row').forEach(r => r.classList.remove('selected'));
                    row.classList.add('selected');
                    const lat = parseFloat(row.dataset.lat);
                    const lon = parseFloat(row.dataset.lon);
                    const id = row.dataset.id;
                    map.setView([lat, lon], 18);
                    if (markers[id]) markers[id].openPopup();
                });
            });
        }

        map.on('moveend', updateView);
    </script>
</body>
</html>
