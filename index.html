<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RestFinder</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f172a; color: #e2e8f0; }

        #city-tabs {
            display: flex;
            background: #0f172a;
            padding: 0 12px;
            border-bottom: 1px solid #1e293b;
        }
        #city-tabs button {
            padding: 10px 20px;
            background: none;
            border: none;
            color: #64748b;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: color 0.15s, border-color 0.15s;
        }
        #city-tabs button:hover { color: #cbd5e1; }
        #city-tabs button.active { color: #f1f5f9; border-bottom-color: #3b82f6; }

        #map-wrap { position: relative; height: 50%; }
        #map { width: 100%; height: 100%; }

        #table-wrap {
            height: calc(50% - 42px);
            overflow-y: auto;
            background: #0f172a;
        }
        #table-wrap table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        #table-wrap thead {
            position: sticky;
            top: 0;
            background: #1e293b;
        }
        #table-wrap th {
            text-align: left;
            padding: 8px 10px;
            font-weight: 600;
            color: #94a3b8;
            border-bottom: 2px solid #334155;
        }
        #table-wrap td {
            padding: 7px 10px;
            border-bottom: 1px solid #1e293b;
            color: #cbd5e1;
            max-width: 220px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        #table-wrap tr.data-row { cursor: pointer; }
        #table-wrap tr.data-row:hover { background: #1e293b; }
        #table-wrap tr.data-row.selected { background: #1e3a5f; }
        #table-wrap td a { color: #60a5fa; text-decoration: none; }
        #table-wrap td a:hover { text-decoration: underline; }
        #placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #475569;
            font-size: 15px;
        }
        /* Keep default light popups to match OSM tiles */
    </style>
</head>
<body>
    <nav id="city-tabs"></nav>
    <div id="map-wrap">
        <div id="map"></div>
    </div>
    <div id="table-wrap">
        <div id="placeholder">Loading...</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <script>
        const map = L.map('map');
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
        }).addTo(map);

        const markerLayer = L.layerGroup().addTo(map);
        const tableWrap = document.getElementById('table-wrap');
        const tabsNav = document.getElementById('city-tabs');

        let cities = [];
        let activeCity = null;
        let cityData = {};
        let markers = {};

        function esc(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        // --- Load cities.json and bootstrap ---
        fetch('cities.json').then(r => r.json()).then(data => {
            cities = data;
            cities.forEach(city => {
                const btn = document.createElement('button');
                btn.textContent = city.name;
                btn.dataset.key = city.key;
                btn.addEventListener('click', () => selectCity(city.key));
                tabsNav.appendChild(btn);
            });
            selectCity(cities[0].key);
        });

        async function selectCity(key) {
            activeCity = key;
            tabsNav.querySelectorAll('button').forEach(b =>
                b.classList.toggle('active', b.dataset.key === key));
            const city = cities.find(c => c.key === key);
            map.setView([city.lat, city.lng], city.zoom);

            tableWrap.innerHTML = '<div id="placeholder">Loading...</div>';
            try {
                await loadCityData(key);
                updateView();
            } catch (err) {
                console.error(err);
                tableWrap.innerHTML = '<div id="placeholder">Failed to load restaurant data.</div>';
            }
        }

        async function loadCityData(key) {
            if (cityData[key]) return;
            const resp = await fetch(`data/${key}.json`);
            if (!resp.ok) throw new Error(`Failed to load data/${key}.json`);
            cityData[key] = await resp.json();
        }

        // --- Filter to visible bounds and render ---
        function updateView() {
            if (!activeCity || !cityData[activeCity]) return;
            const bounds = map.getBounds();
            const visible = cityData[activeCity].filter(r =>
                r.lat >= bounds.getSouth() && r.lat <= bounds.getNorth() &&
                r.lon >= bounds.getWest() && r.lon <= bounds.getEast()
            );

            markerLayer.clearLayers();
            markers = {};
            visible.forEach(r => {
                let popup = `<strong>${esc(r.name)}</strong>`;
                if (r.cuisine) popup += `<br>${esc(r.cuisine)}`;
                if (r.address) popup += `<br><address style="font-style:normal;display:inline">${esc(r.address)}</address>`;
                if (r.phone) popup += `<br><a href="tel:${esc(r.phone)}">${esc(r.phone)}</a>`;
                if (r.website) popup += `<br><a href="${esc(r.website)}" target="_blank" rel="noopener">${esc(r.website.replace(/^https?:\/\//, ''))}</a>`;
                if (r.hours) popup += `<br>${esc(r.hours)}`;
                const m = L.marker([r.lat, r.lon]).bindPopup(popup);
                m.addTo(markerLayer);
                markers[r.id] = m;
            });

            if (visible.length === 0) {
                tableWrap.innerHTML = '<div id="placeholder">No restaurants in this area.</div>';
                return;
            }

            let html = `<table><thead><tr>
                <th>#</th><th>Name</th><th>Cuisine</th><th>Address</th>
                <th>Phone</th><th>Hours</th><th>Website</th>
                </tr></thead><tbody>`;
            visible.forEach((r, i) => {
                const site = r.website ? `<a href="${esc(r.website)}" target="_blank" rel="noopener">link</a>` : '';
                html += `<tr class="data-row" data-id="${r.id}" data-lat="${r.lat}" data-lon="${r.lon}">
                    <td>${i + 1}</td>
                    <td title="${esc(r.name)}">${esc(r.name)}</td>
                    <td title="${esc(r.cuisine)}">${esc(r.cuisine)}</td>
                    <td>${esc(r.address)}</td>
                    <td>${esc(r.phone)}</td>
                    <td title="${esc(r.hours)}">${esc(r.hours)}</td>
                    <td>${site}</td></tr>`;
            });
            html += '</tbody></table>';
            tableWrap.innerHTML = html;

            tableWrap.querySelectorAll('tr.data-row').forEach(row => {
                row.addEventListener('click', () => {
                    tableWrap.querySelectorAll('tr.data-row').forEach(r => r.classList.remove('selected'));
                    row.classList.add('selected');
                    const lat = parseFloat(row.dataset.lat);
                    const lon = parseFloat(row.dataset.lon);
                    const id = parseInt(row.dataset.id);
                    map.setView([lat, lon], 18);
                    if (markers[id]) markers[id].openPopup();
                });
            });
        }

        map.on('moveend', updateView);
    </script>
</body>
</html>
