<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RestFinder</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

        #city-tabs {
            display: flex;
            background: #1e293b;
            padding: 0 12px;
        }
        #city-tabs button {
            padding: 10px 20px;
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: color 0.15s, border-color 0.15s;
        }
        #city-tabs button:hover { color: #e2e8f0; }
        #city-tabs button.active { color: #fff; border-bottom-color: #3b82f6; }

        #map-wrap { position: relative; height: 50%; }
        #map { width: 100%; height: 100%; }
        #search-btn {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            padding: 10px 22px;
            font-size: 14px;
            font-weight: 600;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }
        #search-btn:hover { background: #1d4ed8; }
        #search-btn:disabled { background: #9ca3af; cursor: not-allowed; }

        #table-wrap {
            height: calc(50% - 41px);
            overflow-y: auto;
            background: #f8fafc;
        }
        #table-wrap table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        #table-wrap thead {
            position: sticky;
            top: 0;
            background: #e2e8f0;
        }
        #table-wrap th {
            text-align: left;
            padding: 8px 10px;
            font-weight: 600;
            color: #334155;
            border-bottom: 2px solid #cbd5e1;
        }
        #table-wrap td {
            padding: 7px 10px;
            border-bottom: 1px solid #e2e8f0;
            color: #1e293b;
            max-width: 220px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        #table-wrap tr.data-row { cursor: pointer; }
        #table-wrap tr.data-row:hover { background: #dbeafe; }
        #table-wrap tr.data-row.selected { background: #bfdbfe; }
        #table-wrap td a { color: #2563eb; text-decoration: none; }
        #table-wrap td a:hover { text-decoration: underline; }
        #placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #94a3b8;
            font-size: 15px;
        }
    </style>
</head>
<body>
    <nav id="city-tabs"></nav>
    <div id="map-wrap">
        <div id="map"></div>
        <button id="search-btn">Search Here</button>
    </div>
    <div id="table-wrap">
        <div id="placeholder">Click "Search Here" to find restaurants in the visible area</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <script>
        const MIN_ZOOM = 13;
        const map = L.map('map');
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
        }).addTo(map);

        const markerLayer = L.layerGroup().addTo(map);
        const searchBtn = document.getElementById('search-btn');
        const tableWrap = document.getElementById('table-wrap');
        const tabsNav = document.getElementById('city-tabs');

        let cities = [];
        let activeCity = null;
        let cityData = {};   // key -> array of restaurants (cached)
        let markers = {};    // id -> L.marker

        function esc(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        // --- Load cities.json and bootstrap ---
        fetch('cities.json').then(r => r.json()).then(data => {
            cities = data;
            cities.forEach(city => {
                const btn = document.createElement('button');
                btn.textContent = city.name;
                btn.dataset.key = city.key;
                btn.addEventListener('click', () => selectCity(city.key));
                tabsNav.appendChild(btn);
            });
            selectCity(cities[0].key);
        });

        function selectCity(key) {
            activeCity = key;
            tabsNav.querySelectorAll('button').forEach(b =>
                b.classList.toggle('active', b.dataset.key === key));
            const city = cities.find(c => c.key === key);
            map.setView([city.lat, city.lng], city.zoom);
            markerLayer.clearLayers();
            markers = {};
            tableWrap.innerHTML = '<div id="placeholder">Click "Search Here" to find restaurants in the visible area</div>';
        }

        // --- Load pre-fetched data for a city (cached) ---
        async function loadCityData(key) {
            if (cityData[key]) return cityData[key];
            const resp = await fetch(`data/${key}.json`);
            if (!resp.ok) throw new Error(`Failed to load data/${key}.json`);
            cityData[key] = await resp.json();
            return cityData[key];
        }

        // --- Filter + display ---
        function showRestaurants(restaurants) {
            markerLayer.clearLayers();
            markers = {};

            restaurants.forEach(r => {
                const m = L.marker([r.lat, r.lon])
                    .bindPopup(`<strong>${esc(r.name)}</strong>${r.cuisine ? '<br>' + esc(r.cuisine) : ''}`);
                m.addTo(markerLayer);
                markers[r.id] = m;
            });

            if (restaurants.length === 0) {
                tableWrap.innerHTML = '<div id="placeholder">No restaurants found in this area.</div>';
                return;
            }

            let html = `<table><thead><tr>
                <th>#</th><th>Name</th><th>Cuisine</th><th>Address</th>
                <th>Phone</th><th>Hours</th><th>Website</th>
                </tr></thead><tbody>`;
            restaurants.forEach((r, i) => {
                const site = r.website ? `<a href="${esc(r.website)}" target="_blank" rel="noopener">link</a>` : '';
                html += `<tr class="data-row" data-id="${r.id}" data-lat="${r.lat}" data-lon="${r.lon}">
                    <td>${i + 1}</td>
                    <td title="${esc(r.name)}">${esc(r.name)}</td>
                    <td title="${esc(r.cuisine)}">${esc(r.cuisine)}</td>
                    <td>${esc(r.address)}</td>
                    <td>${esc(r.phone)}</td>
                    <td title="${esc(r.hours)}">${esc(r.hours)}</td>
                    <td>${site}</td></tr>`;
            });
            html += '</tbody></table>';
            tableWrap.innerHTML = html;

            tableWrap.querySelectorAll('tr.data-row').forEach(row => {
                row.addEventListener('click', () => {
                    tableWrap.querySelectorAll('tr.data-row').forEach(r => r.classList.remove('selected'));
                    row.classList.add('selected');
                    const lat = parseFloat(row.dataset.lat);
                    const lon = parseFloat(row.dataset.lon);
                    const id = parseInt(row.dataset.id);
                    map.setView([lat, lon], 18);
                    if (markers[id]) markers[id].openPopup();
                });
            });
        }

        // --- Search: filter pre-loaded data to visible bounds ---
        async function searchRestaurants() {
            if (map.getZoom() < MIN_ZOOM) {
                tableWrap.innerHTML = '<div id="placeholder">Please zoom in closer before searching.</div>';
                return;
            }

            searchBtn.disabled = true;
            searchBtn.textContent = 'Loading\u2026';

            try {
                const all = await loadCityData(activeCity);
                const bounds = map.getBounds();
                const visible = all.filter(r =>
                    r.lat >= bounds.getSouth() && r.lat <= bounds.getNorth() &&
                    r.lon >= bounds.getWest() && r.lon <= bounds.getEast()
                );
                showRestaurants(visible);
            } catch (err) {
                console.error(err);
                tableWrap.innerHTML = '<div id="placeholder">Failed to load restaurant data.</div>';
            } finally {
                searchBtn.disabled = false;
                searchBtn.textContent = 'Search Here';
            }
        }

        searchBtn.addEventListener('click', searchRestaurants);
    </script>
</body>
</html>
