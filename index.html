<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="last-updated" content="">
    <title>RestFinder</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <link rel="stylesheet" href="https://kit.fontawesome.com/a22be8527e.css" crossorigin="anonymous">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f172a; color: #e2e8f0; }

        #city-tabs {
            display: flex;
            background: #0f172a;
            padding: 0 12px;
            border-bottom: 1px solid #1e293b;
        }
        #city-tabs button {
            padding: 10px 20px;
            background: none;
            border: none;
            color: #64748b;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: color 0.15s, border-color 0.15s;
        }
        #city-tabs button:hover { color: #cbd5e1; }
        #city-tabs button.active { color: #f1f5f9; border-bottom-color: #3b82f6; }

        #github-link {
            display: flex;
            align-items: center;
            padding: 0 14px;
            color: #64748b;
            font-size: 20px;
            text-decoration: none;
            transition: color 0.15s;
        }
        #github-link:hover { color: #f1f5f9; }

        .pill {
            padding: 4px 14px;
            border-radius: 9999px;
            border: 1px solid #334155;
            background: none;
            color: #64748b;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
        }
        .pill:hover { border-color: #f59e0b; color: #fbbf24; }
        .pill.active { background: #451a03; border-color: #f59e0b; color: #fbbf24; }
        #last-updated {
            margin-left: auto;
            display: flex;
            align-items: center;
            color: #475569;
            font-size: 11px;
        }

        #map-wrap { position: relative; height: 50%; }
        #map { width: 100%; height: 100%; }

        #table-wrap {
            height: calc(50% - 40px);
            overflow-y: auto;
            background: #0f172a;
        }
        #table-wrap table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        #table-wrap thead {
            position: sticky;
            top: 0;
            background: #1e293b;
        }
        #table-wrap th {
            text-align: left;
            padding: 8px 10px;
            font-weight: 600;
            color: #94a3b8;
            border-bottom: 2px solid #334155;
        }
        #table-wrap td {
            padding: 7px 10px;
            border-bottom: 1px solid #1e293b;
            color: #cbd5e1;
            max-width: 220px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        #table-wrap tr.data-row { cursor: pointer; }
        #table-wrap tr.data-row:hover { background: #1e293b; }
        #table-wrap tr.data-row.selected { background: #1e3a5f; }
        #table-wrap td a { color: #60a5fa; text-decoration: none; }
        #table-wrap td a:hover { text-decoration: underline; }
        #table-wrap td a.foodie-link { color: #f59e0b; }
        #placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #475569;
            font-size: 15px;
        }
    </style>
</head>
<body>
    <nav id="city-tabs"><span id="last-updated"></span></nav>
    <div id="map-wrap">
        <div id="map"></div>
    </div>
    <div id="table-wrap">
        <div id="placeholder">Loading...</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <script>
        const map = L.map('map');
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
        }).addTo(map);

        const markerLayer = L.layerGroup().addTo(map);
        const tableWrap = document.getElementById('table-wrap');
        const tabsNav = document.getElementById('city-tabs');

        let cities = [];
        let activeCity = null;
        let cityData = {};
        let markers = {};
        let foodieFilter = false;

        // --- Last updated ---
        const updatedMeta = document.querySelector('meta[name="last-updated"]');
        if (updatedMeta && updatedMeta.content) {
            document.getElementById('last-updated').textContent = 'Updated: ' + updatedMeta.content;
        }

        // --- Foodie toggle ---
        function onFoodieToggle() {
            foodieFilter = !foodieFilter;
            updateView();
        }

        function esc(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        // --- Load cities.json and bootstrap ---
        fetch('cities.json').then(r => r.json()).then(data => {
            cities = data;
            const lastUpdated = document.getElementById('last-updated');
            cities.forEach(city => {
                const btn = document.createElement('button');
                btn.textContent = city.name;
                btn.dataset.key = city.key;
                btn.addEventListener('click', () => selectCity(city.key));
                tabsNav.insertBefore(btn, lastUpdated);
            });
            const ghLink = document.createElement('a');
            ghLink.href = 'https://github.com/pathikrit/restfinder';
            ghLink.target = '_blank';
            ghLink.rel = 'noopener';
            ghLink.id = 'github-link';
            ghLink.innerHTML = '<i class="fa-brands fa-github"></i>';
            tabsNav.appendChild(ghLink);
            selectCity(cities[0].key);
        });

        async function selectCity(key) {
            activeCity = key;
            tabsNav.querySelectorAll('button').forEach(b =>
                b.classList.toggle('active', b.dataset.key === key));
            const city = cities.find(c => c.key === key);
            map.setView([city.lat, city.lng], city.zoom);

            tableWrap.innerHTML = '<div id="placeholder">Loading...</div>';
            try {
                await loadCityData(key);
                updateView();
            } catch (err) {
                console.error(err);
                tableWrap.innerHTML = '<div id="placeholder">Failed to load restaurant data.</div>';
            }
        }

        async function loadCityData(key) {
            if (cityData[key]) return;
            const resp = await fetch(`data/${key}.json`);
            if (!resp.ok) throw new Error(`Failed to load data/${key}.json`);
            cityData[key] = await resp.json();
        }

        // --- Extract fields from raw tags (or legacy flat format) ---
        function t(r, key) {
            if (r.tags) return r.tags[key] || '';
            return r[key] || '';
        }

        function formatAddress(r) {
            const tags = r.tags || {};
            if (r.tags) {
                return [tags['addr:housenumber'], tags['addr:street'], tags['addr:city'], tags['addr:state'], tags['addr:postcode']]
                    .filter(Boolean).join(' ');
            }
            return r.address || '';
        }

        function formatCuisine(r) {
            return t(r, 'cuisine').replace(/;/g, ', ');
        }

        function formatHours(r) {
            return r.tags ? t(r, 'opening_hours') : t(r, 'hours');
        }

        function formatFoodieLinks(urls) {
            if (!urls || !urls.length) return '';
            return urls.map(url => {
                const domain = new URL(url).hostname.replace(/^www\./, '');
                return `<a href="${esc(url)}" target="_blank" rel="noopener" class="foodie-link">${esc(domain)}</a>`;
            }).join(', ');
        }

        // --- Filter to visible bounds and render ---
        function updateView() {
            if (!activeCity || !cityData[activeCity]) return;
            const bounds = map.getBounds();
            let visible = cityData[activeCity].filter(r =>
                r.lat >= bounds.getSouth() && r.lat <= bounds.getNorth() &&
                r.lon >= bounds.getWest() && r.lon <= bounds.getEast()
            );

            if (foodieFilter) {
                visible = visible.filter(r => r.foodie_urls && r.foodie_urls.length > 0);
            }

            markerLayer.clearLayers();
            markers = {};
            visible.forEach(r => {
                const name = t(r, 'name') || 'Unnamed';
                const cuisine = formatCuisine(r);
                const address = formatAddress(r);
                const phone = t(r, 'phone');
                const website = t(r, 'website');
                const hours = formatHours(r);

                let popup = `<strong>${esc(name)}</strong>`;
                if (cuisine) popup += `<br>${esc(cuisine)}`;
                if (address) popup += `<br><i class="fa-solid fa-location-dot"></i> <address style="font-style:normal;display:inline">${esc(address)}</address>`;
                if (phone) popup += `<br><i class="fa-solid fa-phone"></i> <a href="tel:${esc(phone)}">${esc(phone)}</a>`;
                if (website) popup += `<br><a href="${esc(website)}" target="_blank" rel="noopener">Website</a>`;
                if (hours) popup += `<br>${esc(hours)}`;
                if (r.foodie_urls && r.foodie_urls.length) {
                    popup += `<br><strong style="color:#f59e0b">Foodie:</strong> ${formatFoodieLinks(r.foodie_urls)}`;
                }
                const m = L.marker([r.lat, r.lon]).bindPopup(popup);
                m.addTo(markerLayer);
                markers[r.id] = m;
            });

            if (visible.length === 0) {
                tableWrap.innerHTML = '<div id="placeholder">No restaurants in this area.</div>';
                return;
            }

            const foodieToggleHtml = `<button id="foodie-toggle" class="pill${foodieFilter ? ' active' : ''}" style="margin-left:6px;vertical-align:middle">Foodie</button>`;
            let html = `<table><thead><tr>
                <th>#</th><th>Name</th><th>Cuisine</th><th>Address</th>
                <th>Phone</th><th>Hours</th><th>Website</th><th>Foodie ${foodieToggleHtml}</th>
                </tr></thead><tbody>`;
            visible.forEach((r, i) => {
                const name = t(r, 'name') || 'Unnamed';
                const cuisine = formatCuisine(r);
                const address = formatAddress(r);
                const phone = t(r, 'phone');
                const website = t(r, 'website');
                const hours = formatHours(r);
                const site = website ? `<a href="${esc(website)}" target="_blank" rel="noopener">link</a>` : '';
                const foodie = formatFoodieLinks(r.foodie_urls);
                html += `<tr class="data-row" data-id="${r.id}" data-lat="${r.lat}" data-lon="${r.lon}">
                    <td>${i + 1}</td>
                    <td title="${esc(name)}">${esc(name)}</td>
                    <td title="${esc(cuisine)}">${esc(cuisine)}</td>
                    <td title="${esc(address)}">${esc(address)}</td>
                    <td>${esc(phone)}</td>
                    <td title="${esc(hours)}">${esc(hours)}</td>
                    <td>${site}</td>
                    <td>${foodie}</td></tr>`;
            });
            html += '</tbody></table>';
            tableWrap.innerHTML = html;

            document.getElementById('foodie-toggle').addEventListener('click', onFoodieToggle);

            tableWrap.querySelectorAll('tr.data-row').forEach(row => {
                row.addEventListener('click', () => {
                    tableWrap.querySelectorAll('tr.data-row').forEach(r => r.classList.remove('selected'));
                    row.classList.add('selected');
                    const lat = parseFloat(row.dataset.lat);
                    const lon = parseFloat(row.dataset.lon);
                    const id = parseInt(row.dataset.id);
                    map.setView([lat, lon], 18);
                    if (markers[id]) markers[id].openPopup();
                });
            });
        }

        map.on('moveend', updateView);
    </script>
</body>
</html>
