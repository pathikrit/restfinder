name: Fetch & Deploy

on:
  schedule:
    - cron: '0 6 1 * *'  # 1st of each month at 6am UTC
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          version: "latest"

      - run: make db
        env:
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}

      - name: Inject last-updated timestamp
        run: sed -i 's/\(name="last-updated" content="\)[^"]*/\1'"$(date -u +%Y-%m-%d)"'/' index.html

      - run: make site

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .site

      - id: deploy
        uses: actions/deploy-pages@v4
