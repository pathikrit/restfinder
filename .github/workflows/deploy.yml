name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"

      - if: ${{ github.event_name == 'workflow_dispatch' }}
        run: make db
        env:
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}

      - if: ${{ github.event_name == 'push' }}
        run: make db-copy

      - name: Inject last-updated timestamp
        run: sed -i 's/\(name="last-updated" content="\)[^"]*/\1'"$(date -u +%Y-%m-%d)"'/' index.html

      - run: make site

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .site

      - id: deploy
        uses: actions/deploy-pages@v4
