name: Deploy

on:
  workflow_dispatch:
    inputs:
      build_db:
        description: "Rebuild restaurant database from scratch"
        type: boolean
        default: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - if: ${{ inputs.build_db }}
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"

      - if: ${{ inputs.build_db }}
        run: make db
        env:
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}

      - if: ${{ !inputs.build_db }}
        run: make db-copy

      - name: Inject last-updated timestamp
        run: sed -i 's/\(name="last-updated" content="\)[^"]*/\1'"$(date -u +%Y-%m-%d)"'/' index.html

      - run: make site

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .site

      - id: deploy
        uses: actions/deploy-pages@v4
